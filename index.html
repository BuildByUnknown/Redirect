<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Client...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            box-sizing: border-box;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border-left-color: #10b981;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        h1 {
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            background-color: #10b981;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
            transition: background-color 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #059669;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="loader"></div>
        <h1 id="status-title">Importing Configuration...</h1>
        <p id="status-desc">We are opening your proxy client app to import this configuration automatically. If nothing happens, tap the button below.</p>
        <a href="#" id="redirect-btn" class="btn" style="display: none;">Import Manually</a>
    </div>

    <script>
        function getParameterByName(name) {
            const url = window.location.href;
            const regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)');
            const results = regex.exec(url);
            if (!results) return null;
            if (!results[2]) return '';
            return results[2];
        }

        window.onload = function() {
            const rawUrlParam = getParameterByName('url');
            
            if (rawUrlParam) {
                const targetUrl = decodeURIComponent(rawUrlParam);
                const btn = document.getElementById('redirect-btn');
                const loader = document.getElementById('loader');
                const title = document.getElementById('status-title');
                const desc = document.getElementById('status-desc');

                btn.href = targetUrl;
                
                window.location.href = targetUrl;

                setTimeout(() => {
                    loader.style.display = 'none';
                    btn.style.display = 'inline-block';
                    title.textContent = "Import Blocked?";
                    desc.textContent = "Your browser might have blocked the automatic launch request. Tap below to proceed manually.";
                }, 1200);
            } else {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('status-title').textContent = "Invalid Request";
                document.getElementById('status-desc').textContent = "No valid configuration link found in the request parameters.";
            }
        };
    </script>
</body>
</html>
